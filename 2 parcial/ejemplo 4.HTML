<html>
<head>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(120deg, #89f7fe, #66a6ff);
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    .box {
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.2);
      padding: 30px;
      border-radius: 15px;
      color: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .box:hover {
      transform: translateY(-10px);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="box"> MADI </div>
    <div class="box"> NSON </div>
    <div class="box"> AMAYA</div>
  </div>

</body>
</html>
